---
caddy_binary_path: /usr/local/bin/caddy
caddyfile_path: /etc/caddy
caddy_user: caddy
caddy_group: caddy
caddy_log_path: /var/log/caddy
caddy_build_dependencies:
  Debian:
    - build-essential
    - git
    - golang-go
  RedHat:
    - gcc
    - gcc-c++
    - git
    - golang
  Default:
    - build-essential
    - git
    - golang-go