---

- name: is caddy binary present
  stat:
    path: "{{ caddy_binary_path }}"
  register: caddy_installed

# Caddy does not ship plugins by default, so this role builds its own binary
# with xcaddy and the required plugin packages for the runtime you need.
# The default build includes the cloudflare DNS plugin, transform encoder,
# and rate limit support.
- name: install caddy
  include_tasks:
    file: install.yaml
  #when: caddy_installed == false

- name: configure caddy
  include_tasks:
    file: configure.yaml
