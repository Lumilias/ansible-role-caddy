---

- name: install build dependencies for xcaddy
  ansible.builtin.package:
    name: "{{ caddy_build_dependencies[ansible_os_family] | default(caddy_build_dependencies['Default']) }}"
    state: present
    update_cache: true

- name: install xcaddy
  ansible.builtin.command:
    cmd: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
    creates: "{{ lookup('env', 'HOME') }}/go/bin/xcaddy"
  environment:
    PATH: "{{ ansible_env.PATH }}:/usr/local/go/bin:{{ lookup('env', 'HOME') }}/go/bin"
    GOPATH: "{{ lookup('env', 'HOME') }}/go"

- name: build caddy with required plugins
  ansible.builtin.command:
    cmd: >-
      {{ lookup('env', 'HOME') }}/go/bin/xcaddy build
      --output {{ caddy_binary_path }}
      --with github.com/caddy-dns/cloudflare
      --with github.com/caddyserver/transform-encoder
      --with github.com/mholt/caddy-ratelimit
    creates: "{{ caddy_binary_path }}"
  environment:
    PATH: "{{ ansible_env.PATH }}:/usr/local/go/bin:{{ lookup('env', 'HOME') }}/go/bin"
    GOPATH: "{{ lookup('env', 'HOME') }}/go"

- name: ensure caddy binary is executable
  ansible.builtin.file:
    path: "{{ caddy_binary_path }}"
    mode: '0755'
    owner: root
    group: root

- name: restore SELinux context on caddy binary
  ansible.builtin.command:
    cmd: restorecon -v "{{ caddy_binary_path }}"
  when: ansible_selinux.status | default(false) and ansible_selinux.mode | default('') != 'disabled'
  changed_when: true

- name: Ensure caddy group exists
  ansible.builtin.group:
    name: "{{ caddy_group }}"
    system: true

- name: Add the caddy user
  ansible.builtin.user:
    name: "{{ caddy_user }}"
    group: "{{ caddy_group }}"

- name: install caddy systemd service
  template:
    src: caddy.service.j2
    dest: /etc/systemd/system/caddy.service
    owner: root
    group: root
    mode: 0644

- name: create caddy log directory
  file:
    path: "{{ caddy_log_path }}"
    state: directory
    owner: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    mode: 0755

- name: touch caddy.log
  ansible.builtin.file:
    path: "{{ caddy_log_path }}/caddy.log"
    state: touch
    owner: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    mode: 0755

- name: restart caddy service
  ansible.builtin.systemd:
    name: caddy
    daemon_reload: true
    enabled: yes